<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ARIGRA Phase C Demo</title>
    <script>
      // SPA fallback for GitHub Pages — preserves the path/hash on reload.
      var l = window.location;
      l.replace(l.protocol + "//" + l.host + l.pathname.split("/").slice(0, 2).join("/") + "/#" + l.pathname.split("/").slice(2).join("/") + l.search);
    </script>
  </head>
  <body></body>
</html>
